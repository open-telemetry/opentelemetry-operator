change_type: enhancement

component: auto-instrumentation

note: Add standalone pod mutation webhook deployment for High Availability

issues: [5010]

subtext: |
  The pod mutation webhook (auto-instrumentation and sidecar injection) can now be deployed
  as a standalone Deployment, enabling independent scaling without leader election.

  On Kubernetes (make deploy), the webhook continues to run as part of the operator deployment.

  On OpenShift (OLM), the operator automatically creates and manages a standalone webhook
  Deployment. To scale the webhook, set `STANDALONE_WEBHOOK_REPLICAS=N` via
  Subscription.spec.config.env (default: 1 replica).
