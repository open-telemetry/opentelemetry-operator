# One of 'breaking', 'deprecation', 'new_component', 'enhancement', 'bug_fix'
change_type: enhancement

# The name of the component, or a single word describing the area of concern, (e.g. collector, target allocator, auto-instrumentation, opamp, github action)
component: auto-instrumentation

# A brief description of the change. Surround your text with quotes ("") if it needs to start with a backtick (`).
note: Add experimental support for activating Java, .NET, Node.js and Python auto-instrumentation via the opentelemetry-injector, behind the `operator.autoinstrumentation.injector` feature gate.

# One or more tracking issues related to the change
issues: [2375]

# (Optional) One or more lines of additional information to render under the primary note.
# These lines will be padded with 2 spaces and then inserted directly into the document.
# Use pipe (|) for multiline entries.
subtext: |
  When the feature gate is enabled, the operator injects the [opentelemetry-injector](https://github.com/open-telemetry/opentelemetry-injector)
  shared object into application containers via `LD_PRELOAD` instead of setting runtime-specific
  environment variables (`JAVA_TOOL_OPTIONS`, `CORECLR_*`/`DOTNET_*`, `NODE_OPTIONS`, `PYTHONPATH`) directly.
  The injector sets those variables in-process, only for processes that actually run the matching runtime.
  For .NET and Python, the injector detects the libc flavor (glibc/musl) of the application on its own,
  making the `instrumentation.opentelemetry.io/otel-dotnet-auto-runtime` and
  `instrumentation.opentelemetry.io/otel-python-platform` annotations unnecessary.

  The injector only publishes binaries for amd64 and arm64, so only those variants of the
  auto-instrumentation images ship it. With the feature gate enabled, pods scheduled on other
  architectures the images are built for (s390x, ppc64le) will not be instrumented; for Java and
  Python the instrumentation init container fails, preventing the pod from starting. The operator
  cannot reliably determine the target architecture of a pod at admission time, so heterogeneous
  clusters should only enable the gate once the injector supports all required architectures.
