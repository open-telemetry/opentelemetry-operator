change_type: enhancement

component: target allocator

note: Add `secretsAccessNamespaces` field to PrometheusCR configuration to make the namespaces watched for secrets configurable instead of hardcoding to the collector namespace.

issues: [4999]

subtext: |
  Previously, the Target Allocator always watched the collector namespace for secrets used in
  ServiceMonitor/PodMonitor basicAuth and other secret references. Now, the namespaces to watch
  for secrets can be explicitly configured via `spec.prometheusCR.secretsAccessNamespaces`.
  If not configured, no namespaces are watched for secrets.
