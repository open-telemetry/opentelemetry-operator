name: "Create release issue"
on:
  schedule:
    # Daily at midnight UTC. The dedup check ensures only one issue
    # is created per release cycle.
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. 0.146.0). If empty, auto-detected from RELEASE.md."
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  create-release-issue:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get next release info from RELEASE.md
        id: release-info
        run: |
          # Parse the first data row of the release schedule table.
          # Format: | v0.146.0 | @jaronoff97     |
          NEXT_LINE=$(awk '/^\| v[0-9]/' RELEASE.md | head -1)
          VERSION=$(echo "$NEXT_LINE" | awk -F'|' '{print $2}' | xargs | sed 's/^v//')
          MANAGER=$(echo "$NEXT_LINE" | awk -F'|' '{print $3}' | xargs | sed 's/^@//')

          # Allow override from workflow_dispatch.
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "manager=$MANAGER" >> "$GITHUB_OUTPUT"

      - name: Check if collector release exists for this version
        id: collector
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          # Check if the collector release matching the next operator version has been published.
          # The major.minor typically matches between operator and collector.
          MINOR=$(echo "${VERSION}" | cut -d. -f1-2)
          RELEASED=$(gh api "repos/open-telemetry/opentelemetry-collector-releases/releases" \
            --jq "[.[] | select(.tag_name | startswith(\"v${MINOR}.\")) | select(.draft | not)] | length")

          if [ "$RELEASED" -gt 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing issue
        id: check-existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release-info.outputs.version }}
        run: |
          EXISTING=$(gh issue list --search "Prepare release v${VERSION} in:title" --state open --json number --jq 'length')
          echo "exists=$([ "$EXISTING" -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Create release issue
        if: |
          steps.check-existing.outputs.exists == 'false' &&
          (github.event_name == 'workflow_dispatch' || steps.collector.outputs.exists == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.release-info.outputs.version }}
          MANAGER: ${{ steps.release-info.outputs.manager }}
        run: |
          cat > /tmp/release-issue-body.md <<EOF
          ## Release v${VERSION}

          Release manager: @${MANAGER}

          ### Checklist

          - [ ] Create the \`[chore] Prepare release v${VERSION}\` PR ([instructions](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/main/RELEASE.md))
          - [ ] After merge: publish the auto-created draft GitHub release once all release workflows complete
          - [ ] Update the operator version in the [Helm Chart](https://github.com/open-telemetry/opentelemetry-helm-charts/blob/main/charts/opentelemetry-operator/CONTRIBUTING.md)
          - [ ] Verify the [\`community-operators-prod\`](https://github.com/redhat-openshift-ecosystem/community-operators-prod) PR is approved and merged
          - [ ] Verify the [\`community-operators\`](https://github.com/k8s-operatorhub/community-operators) PR is approved and merged
          EOF

          gh issue create \
            --title "Prepare release v${VERSION}" \
            --assignee "${MANAGER}" \
            --body-file /tmp/release-issue-body.md
