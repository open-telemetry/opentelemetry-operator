name: "Publish PHP Auto-Instrumentation"

on:
  push:
    paths:
      - "autoinstrumentation/php/**"
      - ".github/workflows/publish-autoinstrumentation-php.yaml"
    branches:
      - main
  pull_request:
    paths:
      - "autoinstrumentation/php/**"
      - ".github/workflows/publish-autoinstrumentation-php.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  publish:
    permissions:
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Read version
        run: echo "VERSION=$(cat autoinstrumentation/php/version.txt)" >> $GITHUB_ENV

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/opentelemetry-operator/autoinstrumentation-php
          tags: |
            type=match,pattern=v(.*),group=1,value=v${{ env.VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Package Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        if: ${{ github.event_name == 'push' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare files for docker image
        run: pushd ./autoinstrumentation/php ; ./prepare_files_for_docker_image.sh --ext-ver $VERSION --dest-dir ${PWD}/files_for_docker_image ; popd

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: autoinstrumentation/php
          push: ${{ github.event_name == 'push' }}
          build-args: SUB_DIR_WITH_FILES_FOR_DOCKER_IMAGE=files_for_docker_image
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=publish-autoinstrumentation-php
          cache-to: type=gha,mode=max,scope=publish-autoinstrumentation-php
