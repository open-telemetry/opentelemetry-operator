name: "Publish operator"

on:
  push:
    branches: [main]
    tags: ["v*"]

  workflow_dispatch:

env:
  PLATFORMS: linux/amd64,linux/arm64,linux/s390x,linux/ppc64le
  GHCR_IMAGE: ghcr.io/open-telemetry/opentelemetry-operator/opentelemetry-operator
  DOCKERHUB_IMAGE: otel/opentelemetry-operator

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
      packages: write
      attestations: write
      id-token: write
    name: Publish container images
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      image: ${{ steps.release-image.outputs.image }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "~1.26.2"

      - name: Unshallow
        run: git fetch --prune --unshallow

      - name: Describe the current state
        run: git describe --tags

      - name: Set env vars for the job
        run: |
          grep -v '\#' versions.txt | grep opentelemetry-collector | awk -F= '{print "OTELCOL_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep targetallocator | awk -F= '{print "TARGETALLOCATOR_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep operator-opamp-bridge | awk -F= '{print "OPERATOR_OPAMP_BRIDGE_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep autoinstrumentation-java | awk -F= '{print "AUTO_INSTRUMENTATION_JAVA_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep autoinstrumentation-nodejs | awk -F= '{print "AUTO_INSTRUMENTATION_NODEJS_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep autoinstrumentation-python | awk -F= '{print "AUTO_INSTRUMENTATION_PYTHON_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep autoinstrumentation-dotnet | awk -F= '{print "AUTO_INSTRUMENTATION_DOTNET_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep autoinstrumentation-go | awk -F= '{print "AUTO_INSTRUMENTATION_GO_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep autoinstrumentation-apache-httpd | awk -F= '{print "AUTO_INSTRUMENTATION_APACHE_HTTPD_VERSION="$2}' >> $GITHUB_ENV
          grep -v '\#' versions.txt | grep autoinstrumentation-nginx | awk -F= '{print "AUTO_INSTRUMENTATION_NGINX_VERSION="$2}' >> $GITHUB_ENV
          echo "VERSION_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV
          echo "VERSION=$(git describe --tags | sed 's/^v//')" >> $GITHUB_ENV

      - name: Build the binary for each supported architecture
        run: |
          for platform in $(echo $PLATFORMS | tr "," "\n"); do
            arch=${platform#*/}
            echo "Building manager for $arch"
            make manager ARCH=$arch
          done

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{raw}}
            type=ref,event=branch

      - name: Resolve release image name
        id: release-image
        run: echo "image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Cache Docker layers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Log into Docker.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: ${{ github.event_name == 'push' }}
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Package Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        if: ${{ github.event_name == 'push' }}
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Operator image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Install cosign
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Keyless sign release images
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"
          cosign sign --yes "${DOCKERHUB_IMAGE}@${DIGEST}"

  slsa-provenance:
    permissions:
      contents: read
      id-token: write
      packages: write
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a #v2.1.0
    with:
      image: ${{ needs.publish.outputs.image }}
      digest: ${{ needs.publish.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  collect-security-artifacts:
    permissions:
      contents: write
      id-token: write
      packages: read
    runs-on: ubuntu-latest
    needs:
      - publish
      - slsa-provenance
    if: startsWith(github.ref, 'refs/tags/v')
    outputs:
      provenance_file: ${{ steps.names.outputs.provenance_file }}
      sbom_spdx_file: ${{ steps.names.outputs.sbom_spdx_file }}
      sbom_cyclonedx_file: ${{ steps.names.outputs.sbom_cyclonedx_file }}
    env:
      RELEASE_TAG: ${{ github.ref_name }}
      IMAGE: ${{ needs.publish.outputs.image }}
      DIGEST: ${{ needs.publish.outputs.digest }}
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Install syft
        id: install-syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          syft-version: v1.27.1

      - name: Install grype
        id: install-grype
        uses: anchore/scan-action/download-grype@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7
        with:
          grype-version: v0.104.0

      - name: Create artifact names
        id: names
        run: |
          echo "provenance_file=opentelemetry-operator-${RELEASE_TAG}.intoto.jsonl" >> "$GITHUB_OUTPUT"
          echo "sbom_spdx_file=opentelemetry-operator-${RELEASE_TAG}.sbom.spdx.json" >> "$GITHUB_OUTPUT"
          echo "sbom_cyclonedx_file=opentelemetry-operator-${RELEASE_TAG}.sbom.cyclonedx.json" >> "$GITHUB_OUTPUT"

      - name: Download SLSA provenance
        env:
          PROVENANCE_FILE: ${{ steps.names.outputs.provenance_file }}
        run: |
          cosign download attestation "${IMAGE}@${DIGEST}" \
            --predicate-type slsaprovenance > "${PROVENANCE_FILE}"

      - name: Generate SBOMs with Syft
        env:
          SPDX_FILE: ${{ steps.names.outputs.sbom_spdx_file }}
          CYCLONEDX_FILE: ${{ steps.names.outputs.sbom_cyclonedx_file }}
        run: |
          "${{ steps.install-syft.outputs.cmd }}" "${IMAGE}@${DIGEST}" -o "spdx-json=${SPDX_FILE}"
          "${{ steps.install-syft.outputs.cmd }}" "${IMAGE}@${DIGEST}" -o "cyclonedx-json=${CYCLONEDX_FILE}"

      - name: Attest SBOMs with cosign
        env:
          SPDX_FILE: ${{ steps.names.outputs.sbom_spdx_file }}
          CYCLONEDX_FILE: ${{ steps.names.outputs.sbom_cyclonedx_file }}
        run: |
          cosign attest --yes --predicate "${SPDX_FILE}" --type spdxjson "${IMAGE}@${DIGEST}"
          cosign attest --yes --predicate "${CYCLONEDX_FILE}" --type cyclonedx "${IMAGE}@${DIGEST}"

      - name: Scan SBOM with Grype
        env:
          SPDX_FILE: ${{ steps.names.outputs.sbom_spdx_file }}
        run: |
          set -euo pipefail
          "${{ steps.install-grype.outputs.cmd }}" "sbom:${SPDX_FILE}" --output table | tee grype-results.txt
          {
            echo "## Grype SBOM scan results"
            echo
            echo "Image: \`${IMAGE}@${DIGEST}\`"
            echo
            echo '```text'
            cat grype-results.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload security artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-security-artifacts
          path: |
            ${{ steps.names.outputs.provenance_file }}
            ${{ steps.names.outputs.sbom_spdx_file }}
            ${{ steps.names.outputs.sbom_cyclonedx_file }}

      - name: Attach provenance and SBOM files to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROVENANCE_FILE: ${{ steps.names.outputs.provenance_file }}
          SPDX_FILE: ${{ steps.names.outputs.sbom_spdx_file }}
          CYCLONEDX_FILE: ${{ steps.names.outputs.sbom_cyclonedx_file }}
        run: |
          gh release upload "${RELEASE_TAG}" \
            "${PROVENANCE_FILE}" \
            "${SPDX_FILE}" \
            "${CYCLONEDX_FILE}" \
            --clobber

  verify-supply-chain:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    needs:
      - publish
      - collect-security-artifacts
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      IMAGE: ${{ needs.publish.outputs.image }}
      DIGEST: ${{ needs.publish.outputs.digest }}
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3.9.1

      - name: Install SLSA verifier
        run: |
          set -euo pipefail
          SLSA_VERIFIER_VERSION="v2.7.1"
          curl -sSfL "https://github.com/slsa-framework/slsa-verifier/releases/download/${SLSA_VERIFIER_VERSION}/slsa-verifier-linux-amd64" -o /tmp/slsa-verifier
          install -m 0755 /tmp/slsa-verifier /usr/local/bin/slsa-verifier

      - name: Verify keyless cosign signature
        run: |
          cosign verify "${IMAGE}@${DIGEST}" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/publish-images.yaml@refs/tags/v.+$" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"

      - name: Verify SLSA provenance
        run: |
          slsa-verifier verify-image "${IMAGE}@${DIGEST}" \
            --source-uri "github.com/${{ github.repository }}"
