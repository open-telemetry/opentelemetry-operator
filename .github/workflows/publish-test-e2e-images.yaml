name: "Publish Test E2E images"

on:
  push:
    paths:
      - 'tests/test-e2e-apps/**'
      - '.github/workflows/publish-test-e2e-images.yaml'
      - '.github/workflows/reusable-publish-test-e2e-images.yaml'
    branches:
      - main
  pull_request:
    paths:
      - 'tests/test-e2e-apps/**'
      - '.github/workflows/publish-test-e2e-images.yaml'
      - '.github/workflows/reusable-publish-test-e2e-images.yaml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  bridge-server:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: bridge-server
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  golang:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: golang
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  php-latest:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: php
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  python-latest:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: python
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  python-oldest:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: python
      build-args: 'BASE_IMAGE=docker.io/library/python:3.10-alpine3.22@sha256:8be23d04f6f85e79a56f6b86761f8bd1db7d3f673917c2fcecb049d4af510dc8'
      tag-suffix: '-3.10'
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  java:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: java
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  apache-httpd:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: apache-httpd
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  dotnet:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: dotnet
      platforms: linux/arm64,linux/amd64
  nodejs:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: nodejs
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le
  metrics-basic-auth:
    permissions: # required by the reusable workflow
      contents: read
      packages: write
      attestations: write
      id-token: write
    uses: ./.github/workflows/reusable-publish-test-e2e-images.yaml
    with:
      path: metrics-basic-auth
      platforms: linux/arm64,linux/amd64,linux/s390x,linux/ppc64le 
