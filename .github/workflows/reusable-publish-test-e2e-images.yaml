name: Reusable - Publish autoinstrumentation E2E images

on:
  workflow_call:
    inputs:
      path:
        type: string
        required: true
      platforms:
        type: string
        required: true
      build-args:
        type: string
        required: false
        default: ''
      tag-suffix:
        type: string
        required: false
        default: ''

permissions:
  contents: read

jobs:
  publish-e2e-image:
    permissions:
      packages: write
      attestations: write
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/${{ github.repository }}/e2e-test-app-${{ inputs.path }}
          tags: |
            type=ref,event=branch,suffix=${{ inputs.tag-suffix }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Package Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          tags: ${{ steps.meta.outputs.tags }}
          context: tests/test-e2e-apps/${{ inputs.path }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build-args }}
          push: ${{ github.event_name == 'push' }}
          cache-from: type=gha,scope=publish-e2e-${{ inputs.path }}${{ inputs.tag-suffix }}
          cache-to: type=gha,mode=max,scope=publish-e2e-${{ inputs.path }}${{ inputs.tag-suffix }}
