apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-opamp-bridge-standalone
  namespace: opentelemetry-opamp-bridge
  labels:
    app.kubernetes.io/name: otel-opamp-bridge-standalone
    app.kubernetes.io/component: opamp-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-opamp-bridge-standalone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-opamp-bridge-standalone
        app.kubernetes.io/component: opamp-bridge
    spec:
      serviceAccountName: otel-opamp-bridge-standalone
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: operator-opamp-bridge:latest
          args:
            - --config-file=/conf/config.yaml
            - --mode=standalone
          ports:
            - name: healthz
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: otel-opamp-bridge-standalone-config
