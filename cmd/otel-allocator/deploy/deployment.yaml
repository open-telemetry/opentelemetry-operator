apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-allocator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: target-allocator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: target-allocator
    spec:
      serviceAccountName: target-allocator
      containers:
        - name: target-allocator
          image: target-allocator
          args: ["--config-file=/conf/targetallocator.yaml"]
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OTELCOL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: ta-config
              mountPath: /conf
              readOnly: true
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
      volumes:
        - name: ta-config
          configMap:
            name: target-allocator
