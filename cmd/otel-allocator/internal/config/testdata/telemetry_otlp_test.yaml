# This file is a valid OTel declarative configuration fragment used to smoke-test
# that the Target Allocator's telemetry schema is compatible with otelconf.ParseYAML.
# The meter_provider.readers section mirrors the TA config's telemetry.metrics.readers
# section, ensuring the two schemas stay in sync.
file_format: "0.4"
meter_provider:
  readers:
    - periodic:
        interval: 60000
        timeout: 30000
        exporter:
          otlp_grpc:
            endpoint: "example.com:4317"
            headers:
              - name: "Authorization"
                value: "Api-Token ${env:TA_TOKEN}"
            temporality_preference: delta
            tls:
              insecure: true
    - periodic:
        interval: 30000
        exporter:
          otlp_http:
            endpoint: "https://ingest.example.com/api/v2/otlp"
            headers:
              - name: "Api-Token"
                value: "${env:DT_API_TOKEN}"
            temporality_preference: delta
