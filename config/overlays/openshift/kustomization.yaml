apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../default
- webhook-deployment.yaml
- webhook-pdb.yaml

patches:
- path: manager-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: controller-manager
    version: v1
- path: remove-webhook-from-manager.yaml
- path: metrics_service_tls_patch.yaml
- path: manager_auth_proxy_tls_patch.yaml
- path: remove-cert-manager-annotations.yaml
- path: webhook-mutating-patch.yaml
  target:
    group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    name: mutating-webhook-configuration
    version: v1
- path: webhook-validating-patch.yaml
  target:
    group: admissionregistration.k8s.io
    kind: ValidatingWebhookConfiguration
    name: validating-webhook-configuration
    version: v1
- path: webhook-service-patch.yaml
images:
- name: controller
  newName: ghcr.io/pavolloffay/opentelemetry-operator
  newTag: latest
