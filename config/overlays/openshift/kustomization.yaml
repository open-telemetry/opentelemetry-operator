apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../default

patches:
- path: manager-patch.yaml
  target:
    group: apps
    kind: Deployment
    name: controller-manager
    version: v1
- path: metrics_service_tls_patch.yaml
- path: manager_auth_proxy_tls_patch.yaml
- path: remove-cert-manager-annotations.yaml

replacements:
- source:
    kind: Deployment
    name: controller-manager
    fieldPath: spec.template.spec.containers.[name=manager].image
  targets:
  - select:
      kind: Deployment
      name: controller-manager
    fieldPaths:
    - spec.template.spec.containers.[name=manager].env.[name=RELATED_IMAGE_OPERATOR].value
