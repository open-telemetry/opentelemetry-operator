- op: replace
  path: "/spec/replicas"
  value: 2
- op: replace
  path: "/spec/strategy"
  value:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
- op: add
  path: "/spec/template/spec/affinity"
  value:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-operator
              control-plane: controller-manager
          topologyKey: kubernetes.io/hostname
- op: add
  path: "/spec/template/spec/containers/0/args"
  value:
    - --zap-log-level=info
    - --zap-time-encoding=rfc3339nano
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: METRICS_ADDR
    value: ":8443"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: METRICS_SECURE
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: METRICS_TLS_CERT_FILE
    value: "/var/run/tls/server/tls.crt"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: METRICS_TLS_KEY_FILE
    value: "/var/run/tls/server/tls.key"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: ENABLE_LEADER_ELECTION
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: ENABLE_NGINX_AUTO_INSTRUMENTATION
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: ENABLE_GO_AUTO_INSTRUMENTATION
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: OPENSHIFT_CREATE_DASHBOARD
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: ENABLE_CR_METRICS
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: CREATE_SM_OPERATOR_METRICS
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: FEATURE_GATES
    value: "operator.networkpolicy,operand.networkpolicy"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: TLS_CLUSTER_PROFILE
    value: "true"
- op: add
  path: "/spec/template/spec/containers/0/env/-"
  value:
    name: TLS_CONFIGURE_OPERANDS
    value: "true"
