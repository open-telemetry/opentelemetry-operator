apiVersion: apps/v1
kind: Deployment
metadata:
  name: opentelemetry-operator-pod-webhook
  namespace: system
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-operator-pod-webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opentelemetry-operator-pod-webhook
    spec:
      serviceAccountName: controller-manager
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: opentelemetry-operator-pod-webhook
              topologyKey: kubernetes.io/hostname
      containers:
      - name: webhook
        image: controller:latest
        args:
        - "webhook"
        - "--enable-webhooks=true"
        - "--zap-log-level=info"
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: webhook-certs
        secret:
          defaultMode: 420
          secretName: opentelemetry-operator-pod-webhook-service-cert
