apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: opentelemetry-operator-pod-webhook
  namespace: system
  labels:
    app.kubernetes.io/name: opentelemetry-operator
    app.kubernetes.io/component: pod-webhook
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opentelemetry-operator
      app.kubernetes.io/component: pod-webhook
