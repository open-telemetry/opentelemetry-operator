apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        ports:
        - containerPort: 9443
          $patch: delete
        volumeMounts:
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          $patch: delete
      volumes:
      - name: cert
        $patch: delete
