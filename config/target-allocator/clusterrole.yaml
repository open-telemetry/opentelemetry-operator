apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: target-allocator
  labels:
    app.kubernetes.io/name: target-allocator
    app.kubernetes.io/part-of: opentelemetry-target-allocator
    app.kubernetes.io/component: target-allocator
rules:
  # Prometheus Operator CRDs – required when prometheus_cr is enabled
  - apiGroups: [monitoring.coreos.com]
    resources:
      - alertmanagers
      - prometheuses
      - prometheuses/finalizers
      - alertmanagers/finalizers
      - servicemonitors
      - podmonitors
      - prometheusrules
      - probes
      - scrapeconfigs
    verbs: ["*"]
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: ["*"]
  # Core resources for target discovery
  - apiGroups: [""]
    resources: [namespaces, nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - apiGroups: [discovery.k8s.io]
    resources: [endpointslices]
    verbs: [get, list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]
