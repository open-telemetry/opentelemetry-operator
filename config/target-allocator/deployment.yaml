apiVersion: apps/v1
kind: Deployment
metadata:
  name: target-allocator
  labels:
    app.kubernetes.io/name: target-allocator
    app.kubernetes.io/part-of: opentelemetry-target-allocator
    app.kubernetes.io/component: target-allocator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: target-allocator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: target-allocator
        app.kubernetes.io/part-of: opentelemetry-target-allocator
        app.kubernetes.io/component: target-allocator
    spec:
      serviceAccountName: target-allocator
      automountServiceAccountToken: false
      containers:
        - name: targetallocator
          image: target-allocator
          ports:
            - containerPort: 8080
              name: http-port
              protocol: TCP
          env:
            - name: OTELCOL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: config-volume
              mountPath: /conf/
            - name: serviceaccount-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          livenessProbe:
            httpGet:
              path: /livez
              port: http-port
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http-port
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config-volume
          configMap:
            name: target-allocator
            items:
              - key: targetallocator.yaml
                path: targetallocator.yaml
        - name: serviceaccount-token
          projected:
            defaultMode: 0444
            sources:
              - serviceAccountToken:
                  path: token
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        apiVersion: v1
                        fieldPath: metadata.namespace
