metadata:
  name: test
  namespace: test
spec:
  image: test
  replicas: 1
  mode: deployment
  additionalContainers:
  - image: mirror.gcr.io/library/alpine:latest
    name: alpine
  - image: mirror.gcr.io/library/alpine:latest
    name: alpine2
  config:
    receivers:
      examplereceiver:
        endpoint: "0.0.0.0:12345"
    exporters:
      debug:
    service:
      pipelines:
        metrics:
          receivers: [examplereceiver]
          exporters: [debug]
