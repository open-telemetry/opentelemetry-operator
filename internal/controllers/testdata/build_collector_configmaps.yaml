apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: test.test
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/name: test-collector
    app.kubernetes.io/part-of: opentelemetry
    app.kubernetes.io/version: latest
  name: test-collector
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: opentelemetry-collector
      app.kubernetes.io/instance: test.test
      app.kubernetes.io/managed-by: opentelemetry-operator
      app.kubernetes.io/part-of: opentelemetry
  strategy: {}
  template:
    metadata:
      annotations:
        opentelemetry-operator-config/sha256: f2b5d7e85aee6bedcf5d75e67ff9a0dc4529a9ebfbbb99e84b86e483ba23514b
        prometheus.io/path: /metrics
        prometheus.io/port: "8888"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/component: opentelemetry-collector
        app.kubernetes.io/instance: test.test
        app.kubernetes.io/managed-by: opentelemetry-operator
        app.kubernetes.io/name: test-collector
        app.kubernetes.io/part-of: opentelemetry
        app.kubernetes.io/version: latest
    spec:
      containers:
      - args:
        - --config=/conf/collector.yaml
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: otc-container
              divisor: "0"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: otc-container
              divisor: "0"
              resource: limits.cpu
        image: test
        name: otc-container
        ports:
        - containerPort: 8888
          name: metrics
          protocol: TCP
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        resources: {}
        volumeMounts:
        - mountPath: /conf
          name: otc-internal
        - mountPath: /var/conf/configmap-mount-test1
          name: configmap-mount-test1
        - mountPath: /var/conf/dir/configmap-mount-test2
          name: configmap-mount-test2
      dnsConfig: {}
      dnsPolicy: ClusterFirst
      serviceAccountName: test-collector
      shareProcessNamespace: false
      volumes:
      - configMap:
          items:
          - key: collector.yaml
            path: collector.yaml
          name: test-collector-f2b5d7e8
        name: otc-internal
      - configMap:
          name: mount-test1
        name: configmap-mount-test1
      - configMap:
          name: mount-test2
        name: configmap-mount-test2
---
