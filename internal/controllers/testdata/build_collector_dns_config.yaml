apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: test.test
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/name: test-collector
    app.kubernetes.io/part-of: opentelemetry
    app.kubernetes.io/version: latest
  name: test-collector
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: opentelemetry-collector
      app.kubernetes.io/instance: test.test
      app.kubernetes.io/managed-by: opentelemetry-operator
      app.kubernetes.io/part-of: opentelemetry
  strategy: {}
  template:
    metadata:
      annotations:
        opentelemetry-operator-config/sha256: 2d266e55025628659355f1271b689d6fb53648ef6cd5595831f5835d18e59a25
        prometheus.io/path: /metrics
        prometheus.io/port: "8888"
        prometheus.io/scrape: "true"
      labels:
        app.kubernetes.io/component: opentelemetry-collector
        app.kubernetes.io/instance: test.test
        app.kubernetes.io/managed-by: opentelemetry-operator
        app.kubernetes.io/name: test-collector
        app.kubernetes.io/part-of: opentelemetry
        app.kubernetes.io/version: latest
    spec:
      containers:
      - args:
        - --config=/conf/collector.yaml
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: otc-container
              divisor: "0"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: otc-container
              divisor: "0"
              resource: limits.cpu
        image: test
        name: otc-container
        ports:
        - containerPort: 12345
          name: examplereceiver
        - containerPort: 8888
          name: metrics
          protocol: TCP
        resources: {}
        volumeMounts:
        - mountPath: /conf
          name: otc-internal
      dnsConfig:
        nameservers:
        - 8.8.8.8
        searches:
        - my.dns.search.suffix
      dnsPolicy: None
      serviceAccountName: test-collector
      shareProcessNamespace: false
      volumes:
      - configMap:
          items:
          - key: collector.yaml
            path: collector.yaml
          name: test-collector-2d266e55
        name: otc-internal
---
