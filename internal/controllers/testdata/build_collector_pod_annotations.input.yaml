metadata:
  name: test
  namespace: test
  annotations:
    regular-annotation: regular-value
spec:
  image: test
  replicas: 1
  mode: deployment
  podAnnotations:
    pod-annotation1: value1
    pod-annotation2: value2
  config:
    receivers:
      examplereceiver:
        endpoint: "0.0.0.0:12345"
    exporters:
      debug:
    service:
      pipelines:
        metrics:
          receivers: [examplereceiver]
          exporters: [debug]
