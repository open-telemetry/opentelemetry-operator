              divisor: "0"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: opamp-bridge-container
              divisor: "0"
              resource: limits.cpu
        image: test
        name: opamp-bridge-container
        resources: {}
        volumeMounts:
