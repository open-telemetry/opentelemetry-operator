  strategy: {}
  template:
    metadata:
      annotations:
        opentelemetry-targetallocator-config/hash: a81383bc4e7ebbf141d2fd9cde3dcd9758bc47f27af6cbaeb0f14ab6360e08c6
      labels:
        app.kubernetes.io/component: opentelemetry-targetallocator
