    spec:
      containers:
      - env:
        - name: OTELCOL_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              containerName: ta-container
              divisor: "0"
              resource: limits.memory
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              containerName: ta-container
              divisor: "0"
              resource: limits.cpu
        image: default-ta-allocator
        livenessProbe:
          httpGet:
            path: /livez
            port: 8080
        name: ta-container
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8080
        resources: {}
        volumeMounts:
        - mountPath: /conf
          name: ta-internal
      dnsConfig: {}
      dnsPolicy: ClusterFirst
      serviceAccountName: test-targetallocator
      shareProcessNamespace: false
      volumes:
      - configMap:
          items:
          - key: targetallocator.yaml
            path: targetallocator.yaml
          name: test-targetallocator
        name: ta-internal
