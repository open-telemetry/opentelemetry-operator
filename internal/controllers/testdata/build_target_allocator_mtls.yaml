apiVersion: v1
data:
  targetallocator.yaml: |
    allocation_strategy: consistent-hashing
    collector_selector:
      matchlabels:
        app.kubernetes.io/component: opentelemetry-collector
        app.kubernetes.io/instance: test.test
        app.kubernetes.io/managed-by: opentelemetry-operator
        app.kubernetes.io/part-of: opentelemetry
      matchexpressions: []
    config:
      scrape_configs:
      - job_name: example
        metric_relabel_configs:
        - replacement: $1_$2
          source_labels:
          - job
          target_label: job
        relabel_configs:
        - replacement: my_service_$1
          source_labels:
          - __meta_service_id
          target_label: job
        - replacement: $1
          source_labels:
          - __meta_service_name
          target_label: instance
    filter_strategy: relabel-config
    https:
      ca_file_path: /tls/ca.crt
      enabled: true
      listen_addr: :8443
      tls_cert_file_path: /tls/tls.crt
      tls_key_file_path: /tls/tls.key
    prometheus_cr:
      enabled: true
      pod_monitor_namespace_selector: null
      pod_monitor_selector: null
      probe_namespace_selector: null
      probe_selector: null
      scrape_config_namespace_selector: null
      scrape_config_selector: null
      service_monitor_namespace_selector: null
      service_monitor_selector: null
