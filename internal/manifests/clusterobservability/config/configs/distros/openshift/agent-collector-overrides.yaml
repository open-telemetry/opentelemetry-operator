# OpenShift specific overrides for agent collector
# These settings will be merged with agent-collector-base.yaml

receivers:
  kubeletstats:
    collection_interval: 10s
    auth_type: serviceAccount
    endpoint: "https://${env:K8S_NODE_NAME}:10250"
    ca_file: /etc/kubelet-serving-ca/ca-bundle.crt
    metric_groups:
      - container
      - pod
      - node
      - volume
    extra_metadata_labels:
      - container.id
    
  filelog:
    include:
      - "/var/log/pods/*/*/*.log"
      - "/var/log/containers/*.log"
    exclude:
      - "/var/log/pods/openshift-*/*/*.log"
      - "/var/log/pods/kube-*/*/*.log"
      - "/var/log/pods/*/otc-container/*.log"
    start_at: end
    include_file_path: true
    include_file_name: false
    operators:
      - type: container
        id: container-parser

processors:
  resourcedetection:
    # OpenShift resource detector will add cloud provider attributes automatically
    detectors: ["env", "system", "k8snode", "openshift"]
    timeout: 5s
    
  k8sattributes:
    auth_type: serviceAccount
    passthrough: false
    filter:
      node_from_env_var: K8S_NODE_NAME
    extract:
      metadata:
        - "k8s.namespace.name"
        - "k8s.deployment.name"
        - "k8s.statefulset.name"
        - "k8s.daemonset.name"
        - "k8s.cronjob.name"
        - "k8s.job.name"
        - "k8s.node.name"
        - "k8s.pod.name"
        - "k8s.pod.uid"
        - "k8s.pod.start_time"
    pod_association:
      - sources:
          - from: resource_attribute
            name: "k8s.pod.ip"
      - sources:
          - from: resource_attribute
            name: "k8s.pod.uid"
      - sources:
          - from: connection