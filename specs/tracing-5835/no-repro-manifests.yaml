# Reproducer for TRACING-5835: jvm_memory_used_bytes description conflict
#
# Prerequisites:
#   - OpenTelemetry Operator installed
#   - cert-manager installed
#
# Apply:
#   kubectl create namespace tracing-5835
#   kubectl apply -f repro-manifests.yaml
#
# Observe the bug:
#   kubectl logs -n tracing-5835 -l app.kubernetes.io/name=otel-collector-collector -f \
#     | grep "Instrument description conflict"
#
# Expected output (info-level warning from the prometheus exporter):
#   Instrument description conflict, using existing description
#     instrument: jvm_memory_used_bytes
#     existing:   "The amount of used memory"
#     dropped:    "Measure of memory used."
#
# Cleanup:
#   kubectl delete namespace tracing-5835

---
apiVersion: v1
kind: Namespace
metadata:
  name: tracing-5835-no-repro

---
# Collector: receives OTLP metrics and exposes them via Prometheus exporter.
# The prometheus exporter is what triggers the description-conflict log.
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: tracing-5835-no-repro
spec:
  config:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    exporters:
      debug:
        verbosity: basic
      prometheus:
        endpoint: "0.0.0.0:9090"
    service:
      telemetry:
        logs:
          level: info
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheus, debug]
        traces:
          receivers: [otlp]
          exporters: [debug]

---
# Instrumentation CR: v2.x Java agent with Micrometer bridge re-enabled.
# The original reporter on OCP 4.18 was running v2.x (evidenced by
# jvm_memory_used_bytes — new semconv naming). In v2.x the bridge is
# OFF by default; re-enabling it reproduces the description conflict.
apiVersion: opentelemetry.io/v1alpha1
kind: Instrumentation
metadata:
  name: java-instrumentation
  namespace: tracing-5835-no-repro
spec:
  exporter:
    endpoint: http://otel-collector-collector.tracing-5835-no-repro.svc:4318
  propagators:
    - tracecontext
    - baggage
  java:
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.26.1
---
# A Spring Boot application with Micrometer on the classpath.
# Spring Boot Actuator auto-registers JvmMemoryMetrics, which emits
# jvm.memory.used with description "The amount of used memory".
# The OTel Java agent also emits jvm.memory.used with description
# "Measure of memory used." -- triggering the conflict.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-petclinic
  namespace: tracing-5835-no-repro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-petclinic
  template:
    metadata:
      labels:
        app: spring-petclinic
      annotations:
        instrumentation.opentelemetry.io/inject-java: "true"
    spec:
      containers:
        - name: petclinic
          # Spring PetClinic: includes spring-boot-starter-actuator with Micrometer
          image: localhost/spring-petclinic:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
