apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: simplest
  namespace: chainsaw-k8s-leader-elector
spec:
  config:
    extensions:
      k8s_leader_elector: {}
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
    exporters:
      debug: {}
    service:
      extensions: [k8s_leader_elector]
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug]
