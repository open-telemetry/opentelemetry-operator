apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: simplest
  namespace: chainsaw-kubeletstats
spec:
  config:
    receivers:
      kubeletstats:
        auth_type: ""
    exporters:
      debug: {}
    service:
      pipelines:
        traces:
          receivers: [kubeletstats]
          processors: []
          exporters: [debug]
