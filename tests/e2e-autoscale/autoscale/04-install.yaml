# This creates two different deployments:
#   * The first one is to ensure an autoscaler is created without
#     setting any metrics in the Spec.
#   * The second is to check that scaling works properly and that
#     spec updates are working as expected.
#
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: simplest
spec:
  autoscaler:
    minReplicas: 1
    maxReplicas: 2
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 5m
      memory: 64Mi

  config:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    exporters:
      debug: {}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug]
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: simplest-set-utilization
spec:
  autoscaler:
    minReplicas: 1
    maxReplicas: 2
  resources:
    limits:
      cpu: 250m
      memory: 128Mi
    requests:
      cpu: 5m
      memory: 64Mi

  config:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    exporters:
      debug: {}

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug]
