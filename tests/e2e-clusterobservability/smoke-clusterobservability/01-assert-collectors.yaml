apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cluster-obs-agent-collector
status:
  numberMisscheduled: 0
  (desiredNumberScheduled > `0` && desiredNumberScheduled == numberReady): true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cluster-obs-cluster-collector
status:
  readyReplicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sink-collector
status:
  readyReplicas: 1
