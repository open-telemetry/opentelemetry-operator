apiVersion: v1
kind: Pod
metadata:
  labels:
    app: app-a
spec:
  containers:
  - name: myapp
  initContainers:
  - name: opentelemetry-auto-instrumentation-java
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:1.33.6
status:
  containerStatuses:
  - name: myapp
    ready: true
    started: true
  initContainerStatuses:
  - name: opentelemetry-auto-instrumentation-java
    ready: true
  phase: Running
