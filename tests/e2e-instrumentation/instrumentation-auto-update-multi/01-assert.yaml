# app-a should be restarted with the new image
apiVersion: v1
kind: Pod
metadata:
  labels:
    app: app-a
spec:
  containers:
  - name: myapp
  initContainers:
  - name: opentelemetry-auto-instrumentation-java
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:2.26.1
status:
  containerStatuses:
  - name: myapp
    ready: true
    started: true
  initContainerStatuses:
  - name: opentelemetry-auto-instrumentation-java
    ready: true
  phase: Running
---
# app-b should NOT be restarted, still using the old image
apiVersion: v1
kind: Pod
metadata:
  labels:
    app: app-b
spec:
  containers:
  - name: myapp
  initContainers:
  - name: opentelemetry-auto-instrumentation-java
    image: ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-java:1.33.6
status:
  containerStatuses:
  - name: myapp
    ready: true
    started: true
  initContainerStatuses:
  - name: opentelemetry-auto-instrumentation-java
    ready: true
  phase: Running
