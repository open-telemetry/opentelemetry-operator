# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: instrumentation-auto-update-multi
spec:
  steps:
  - name: step-00
    try:
    - apply:
        file: 00-install-instrumentation.yaml
    - apply:
        file: 00-install-apps.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - podLogs:
        selector: app=app-a
    - podLogs:
        selector: app=app-b
  - name: step-01-update-only-inst-a
    try:
    - apply:
        file: 01-update-inst-a.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - podLogs:
        selector: app=app-a
    - podLogs:
        selector: app=app-b
