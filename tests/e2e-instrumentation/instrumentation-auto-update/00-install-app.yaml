apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-java-auto-update
spec:
  selector:
    matchLabels:
      app: my-java-auto-update
  replicas: 1
  template:
    metadata:
      labels:
        app: my-java-auto-update
      annotations:
        instrumentation.opentelemetry.io/inject-java: "java-auto-update"
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 3000
      containers:
      - name: myapp
        image: ghcr.io/open-telemetry/opentelemetry-operator/e2e-test-app-java:main
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
