# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: instrumentation-java-other-ns
spec:
  steps:
  - name: step-01
    try:
    # In OpenShift, when a namespace is created, all necessary SCC annotations are automatically added. However, if a namespace is created using a resource file with only selected SCCs, the other auto-added SCCs are not included. Therefore, the UID-range and supplemental groups SCC annotations must be set after the namespace is created.
    - command:
        entrypoint: kubectl
        args:
        - annotate
        - namespace
        - ${NAMESPACE}
        - openshift.io/sa.scc.uid-range=1000/1000
        - --overwrite
    - command:
        entrypoint: kubectl
        args:
        - annotate
        - namespace
        - ${NAMESPACE}
        - openshift.io/sa.scc.supplemental-groups=3000/3000
        - --overwrite
    - delete:
        ref:
          apiVersion: v1
          kind: Namespace
          name: my-other-ns
  - name: step-02
    try:
    - apply:
        file: 02-install-collector.yaml
    - apply:
        file: 02-install-instrumentation.yaml
  - name: step-03
    try:
    - apply:
        file: 03-install-app.yaml
    - assert:
        file: 03-assert.yaml
    catch:
      - podLogs:
          selector: app=my-java-other-ns
  - name: Make a request to the app
    try:
      - command:
          env:
          - name: appnamespace
            value: ($namespace)
          entrypoint: kubectl
          args:
            - get
            - pod
            - -n
            - $appnamespace
            - -l
            - app=my-java-other-ns
            - -o
            - jsonpath={.items[0].metadata.name}
          outputs:
          - name: podName
            value: ($stdout)
      - proxy:
          apiVersion: v1
          kind: Pod
          name: ($podName)
          namespace: ($namespace)
          port: "8080"
  - name: Check for presence of traces and metrics in the OTEL sidecar logs
    try:
    - script:
        timeout: 2m
        content: ./check_logs.sh
