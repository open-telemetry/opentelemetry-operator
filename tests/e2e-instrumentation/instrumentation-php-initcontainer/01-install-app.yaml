apiVersion: v1
kind: Pod
metadata:
  name: my-php-initcontainer
  labels:
    app: my-php-initcontainer
  annotations:
    instrumentation.opentelemetry.io/inject-php: "true"
    instrumentation.opentelemetry.io/container-names: "php-init"
spec:
  securityContext:
    runAsUser: 1000
    runAsGroup: 3000
    fsGroup: 3000
  initContainers:
    - name: php-init
      image: ghcr.io/open-telemetry/opentelemetry-operator/e2e-test-app-php:main
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ "ALL" ]
        seccompProfile:
          type: RuntimeDefault
      command: [ "/bin/sh", "-c" ]
      # Start app, generate telemetry, wait for flush, then exit
      args:
        - |
          echo "PHP init container starting"
          # Start the app
          cd /app && php -S 0.0.0.0:8080 &
          APP_PID=$!
          sleep 10
          # Stop the app
          kill $APP_PID 2>/dev/null || true
          echo "PHP init container completed"
          exit 0

  containers:
    - name: myapp
      image: mirror.gcr.io/library/busybox:latest
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: [ "ALL" ]
        seccompProfile:
          type: RuntimeDefault
      command: [ "sleep", "infinity" ]

