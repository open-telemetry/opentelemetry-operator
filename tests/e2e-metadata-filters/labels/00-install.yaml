apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: test-labels
  labels:
    annotation.filter.out: "true"
spec:
  mode: daemonset
  config:
    receivers:
      jaeger:
        protocols:
          grpc: {}
    exporters:
      debug: {}

    service:
      pipelines:
        traces:
          receivers: [jaeger]
          exporters: [debug]
