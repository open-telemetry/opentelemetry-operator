# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  creationTimestamp: null
  name: instrumentation-multi-multicontainer
spec:
  steps:
  - name: Add OpenShift namespace annotations
    use:
      template: ../../step-templates/openshift-namespace-annotations.yaml
  - name: step-00
    try:
    - apply:
        file: 00-install-collector.yaml
    - apply:
        file: 00-install-instrumentation.yaml
    - script:
        content: |
          end=$(( $(date +%s) + 120 ))
          until kubectl get deployment/deployment-collector -n "$NAMESPACE" >/dev/null 2>&1; do
            [ "$(date +%s)" -ge "$end" ] && exit 1
            sleep 2
          done
          kubectl rollout status deployment/deployment-collector -n "$NAMESPACE" --timeout=2m
  - name: step-01
    try:
    - apply:
        file: 01-install-app.yaml
    - assert:
        file: 01-assert.yaml
    catch:
      - podLogs:
          selector: app=pod-with-multi-instrumentation
      - podLogs:
          selector: app.kubernetes.io/name=deployment-collector
