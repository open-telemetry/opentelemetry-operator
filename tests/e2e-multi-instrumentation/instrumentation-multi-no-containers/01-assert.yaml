apiVersion: v1
kind: Pod
metadata:
  annotations:
    instrumentation.opentelemetry.io/inject-nodejs: "true"
    instrumentation.opentelemetry.io/inject-python: "true"
    sidecar.opentelemetry.io/inject: "true"
  labels:
    app: pod-multi-instr-no-containers
spec:
  containers:
  - env:
    - name: TEST
      value: test
    - name: NODE_PATH
      value: /usr/local/lib/node_modules
    name: nodejsapp
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true
  - env:
    - name: TEST
      value: test
    name: pythonapp
    volumeMounts:
    - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
      readOnly: true
  # Check for non-native sidecar mode (otc-container in containers)
  (containers[?name == 'otc-container']):
  - name: otc-container
    args:
    - --config=env:OTEL_CONFIG
  # Check for native sidecar mode (otc-container in initContainers)
  (initContainers[?name == 'otc-container']):
  - name: otc-container
    restartPolicy: Always
    args:
    - --config=env:OTEL_CONFIG
status:
  containerStatuses:
  - name: nodejsapp
    ready: true
    started: true
  # Check for non-native sidecar status (otc-container in containerStatuses)
  (containerStatuses[?name == 'otc-container']):
  - name: otc-container
    ready: true
    started: true
  # Check for native sidecar status (otc-container in initContainerStatuses)
  (initContainerStatuses[?name == 'otc-container']):
  - name: otc-container
    ready: true
  - name: pythonapp
    ready: true
    started: true
  phase: Running
