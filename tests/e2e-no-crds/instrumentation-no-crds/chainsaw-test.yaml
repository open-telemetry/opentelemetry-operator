# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: instrumentation-java
spec:
  steps:
  - name: Install certs
    try:
      - apply:
          file: install-certs.yaml
  - name: Register certs
    try:
      - command:
          entrypoint: kubectl
          args:
            - certificate
            - approve
            - operator
  - name: step-00
    try:
    - apply:
        file: 00-install-collector.yaml
    - script:
        env:
          - name: JAVAIMAGE
            value: ($values.javaimage)
        content:
          sed -e "s|JAVAIMAGE|$JAVAIMAGE|g" manager-config.tmpl > /tmp/configmap.yaml
    - apply:
        file: /tmp/configmap.yaml
    - apply:
        bindings:
          - name: managerimage
            value: ($values.managerimage)
        file: 00-install-operator.yaml
        template: true
    - command:
        entrypoint: kubectl
        args:
         - get
         - pod
         - -n
         - ${NAMESPACE}
         - -l
         - app=operator
         - -o
         - jsonpath={.items[0].metadata.name}
        outputs:
          - name: podName
            value: ($stdout)
    - wait:
        apiVersion: v1
        kind: Pod
        name: ($podName)
        namespace: ($namespace)
        timeout: 1m
        for:
          condition: { name: "Ready", value: "true" }
  - name: step-01
    try:
    - apply:
        file: 01-install-app.yaml
    - assert:
        file: 01-assert.yaml
    catch:
      - podLogs:
          selector: app=my-java
  - name: Make a request to the app
    try:
      - command:
          entrypoint: kubectl
          args:
            - get
            - pod
            - -n
            - ${NAMESPACE}
            - -l
            - app=my-java
            - -o
            - jsonpath={.items[0].metadata.name}
          outputs:
          - name: podName
            value: ($stdout)
      - proxy:
          apiVersion: v1
          kind: Pod
          name: ($podName)
          namespace: ${NAMESPACE}
          port: "8080"
  - name: Wait for telemetry data
    try:
    - command:
        entrypoint: kubectl
        args:
          - get
          - pod
          - -n
          - ${NAMESPACE}
          - -l
          - app=my-java
          - -o
          - jsonpath={.items[0].spec.initContainers[0].image}
        outputs:
          - name: instrumentationImage
            value: ($stdout)
    - script:
        bindings:
          - name: instrumentationVersion
            value: (split($instrumentationImage,':')[1])
          - name: instrumentationMajorVersion
            value: (to_number(split($instrumentationVersion,'.')[0]))
          - name: jvmProcessMemoryMetricName
            value: (($instrumentationMajorVersion < `2` && 'process.runtime.jvm.memory.usage') || 'jvm.memory.used')
        env:
          - name: LABEL_SELECTOR
            value: "app=collector"
          - name: CONTAINER_NAME
            value: "collector"
          - name: RETRY_TIMEOUT
            value: "120"
          - name: RETRY_SLEEP
            value: "5"
          - name: SEARCH_STRINGS_ENV
            value: ($jvmProcessMemoryMetricName)
        timeout: 2m
        content: ../../test-e2e-apps/scripts/check_pod_logs.sh
  - name: Check the instrumented app has sent the telemetry data successfully
    try:
      - command:
          entrypoint: kubectl
          args:
            - get
            - pod
            - -n
            - ${NAMESPACE}
            - -l
            - app=collector
            - -o
            - jsonpath={.items[0].metadata.name}
          outputs:
          - name: podName
            value: ($stdout)
      - script:
          env:
          - name: podName
            value: ($podName)
          content: |
            #!/bin/bash
            # set -ex
            kubectl logs ${podName} | grep my-java
    catch:
      - podLogs:
          selector: app=my-java
          container: myapp
