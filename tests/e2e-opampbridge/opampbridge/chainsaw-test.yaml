apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: opampbridge
spec:
  steps:
    - catch:
        - podLogs:
            selector: app=e2e-test-app-bridge-server
      name: step-00
      try:
        - apply:
            file: 00-install.yaml
        - assert:
            file: 00-assert.yaml
    - catch:
        - podLogs:
            selector: app.kubernetes.io/component=opentelemetry-opamp-bridge
      name: step-01
      try:
        - apply:
            file: 01-install.yaml
        - assert:
            file: 01-assert.yaml
    - name: Check bridge is connected and healthy before installing collectors
      try:
        - script:
            content: |
              #!/bin/bash
              set -eu
              last=""
              for _ in $(seq 1 60); do
                if last=$(kubectl get --raw /api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents 2>/dev/null); then
                  count=$(printf '%s' "$last" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "0")
                  if [ "$count" -eq 1 ]; then
                    printf '%s' "$last"
                    exit 0
                  fi
                fi
                sleep 1
              done
              printf '%s\n' "$last" >&2
              exit 1
            outputs:
              - name: result
                value: (json_parse($stdout))
        - assert:
            resource:
              (length(values($result))): 1
              (values($result)[0].status.sequence_num >= `2`): true
              (values($result)[0].status.health.healthy): true
    - catch:
        - podLogs:
            selector: app.kubernetes.io/component=opentelemetry-opamp-bridge
      name: step-02
      try:
        - apply:
            file: 02-install.yaml
        - assert:
            file: 02-assert.yaml
    - try:
        - sleep:
            duration: 1s
    # Right now the heartbeat interval isn't configurable by the CRD for the bridge
    # This means that it can take 45s to inform the server of the new collector
    # By deleting the pod we can just shortcut that
    - try:
        - script:
            content: |
              #!/bin/bash
              kubectl delete pod -l app.kubernetes.io/name=test-opamp-bridge -n $NAMESPACE
    - try:
        - sleep:
            duration: 3s
    - try:
      - assert:
          # specify resource inline
          resource:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: test-opamp-bridge
            status:
              readyReplicas: 1
    - name: Check effective config contains the managed collector
      try:
        - script:
            content: |
              #!/bin/bash
              set -eu
              last=""
              for _ in $(seq 1 60); do
                if last=$(kubectl get --raw /api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents 2>/dev/null); then
                  if printf '%s' "$last" | grep -q "\"$NAMESPACE/simplest\":" && \
                     printf '%s' "$last" | grep -q '"healthy":true'; then
                    printf '%s' "$last"
                    exit 0
                  fi
                fi
                sleep 1
              done
              printf '%s\n' "$last" >&2
              exit 1
            outputs:
              - name: result
                value: (json_parse($stdout))
        - assert:
            resource:
              (length(values($result))): 1
              (values($result)[0].status.health.healthy): true
    - name: Verify content is accurate
      try:
        - script:
            content: |
              #!/bin/bash
              set -eu
              last=""
              for _ in $(seq 1 60); do
                if last=$(kubectl get --raw /api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents 2>/dev/null); then
                  if printf '%s' "$last" | grep -q "\"$NAMESPACE/simplest\":"; then
                    # Extract only the effective_config entry for our test collector by its key
                    key="$NAMESPACE/simplest"
                    printf '%s' "$last" | jq -r --arg k "$key" '.[values | keys[0]].effective_config[$k]'
                    exit 0
                  fi
                fi
                sleep 1
              done
              printf '%s\n' "$last" >&2
              exit 1
            outputs:
              - name: collectorYaml
                value: ($stdout)
        - assert:
            timeout: 30s
            resource:
              (parse_yaml($collectorYaml)):
                metadata:
                  name: simplest
                spec:
                  config:
                    # Right now we can't match null values in chainsaw
                    # Wait for https://github.com/kyverno/kyverno-json/pull/432 to merge
                    exporters: (`{}`)
                    receivers:
                      jaeger:
                        protocols: (`{}`)
                      otlp:
                        protocols: (`{}`)
                    service:
                      pipelines:
                        traces:
                          exporters:
                            - debug
                          receivers:
                            - jaeger
                            - otlp
    # ---------------------------------------------------------------------------
    # Scenario 1: Bridge accepts CommandType_Restart and the managed collector
    #             gets the kubectl.kubernetes.io/restartedAt annotation set,
    #             proving TriggerRollout was called.
    # ---------------------------------------------------------------------------
    - catch:
        - podLogs:
            selector: app=e2e-test-app-bridge-server
        - podLogs:
            selector: app.kubernetes.io/component=opentelemetry-opamp-bridge
      name: "scenario 1: restart command triggers collector rollout"
      try:
        - script:
            timeout: 30s
            content: |
              #!/bin/bash
              set -eu
              # The bridge server runs from a scratch image with no shell tools.
              # Use the Kubernetes API proxy to reach the service from the host.
              PROXY_PORT=18321
              kubectl proxy --port=$PROXY_PORT &>/dev/null &
              PROXY_PID=$!
              sleep 1
              curl -fsS -X POST \
                "http://127.0.0.1:$PROXY_PORT/api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents/send-command" \
                -H "Content-Type: application/json" \
                -d '{"command_type":"restart"}'
              STATUS=$?
              kill $PROXY_PID 2>/dev/null || true
              exit $STATUS
        # Poll until the restartedAt annotation appears on the collector Deployment.
        - script:
            timeout: 60s
            content: |
              #!/bin/bash
              set -eu
              for _ in $(seq 1 30); do
                val=$(kubectl get deployment simplest-collector -n "$NAMESPACE" \
                  -o jsonpath='{.spec.template.metadata.annotations.kubectl\.kubernetes\.io/restartedAt}' 2>/dev/null || true)
                if [ -n "$val" ]; then
                  printf '%s' "$val"
                  exit 0
                fi
                sleep 1
              done
              echo "restartedAt annotation never appeared" >&2
              exit 1
            outputs:
              - name: restartedAt
                value: ($stdout)
        - assert:
            resource:
              (length($restartedAt) > `0`): true

    # ---------------------------------------------------------------------------
    # Scenario 3: Bridge remains healthy and connected after processing the
    #             restart command (bridge itself does not restart; it only
    #             triggers a rollout on the managed collector).
    # ---------------------------------------------------------------------------
    - catch:
        - podLogs:
            selector: app=e2e-test-app-bridge-server
        - podLogs:
            selector: app.kubernetes.io/component=opentelemetry-opamp-bridge
      name: "scenario 3: bridge remains healthy after restart command"
      try:
        - script:
            content: |
              #!/bin/bash
              set -eu
              last=""
              for _ in $(seq 1 30); do
                if last=$(kubectl get --raw /api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents 2>/dev/null); then
                  if printf '%s' "$last" | grep -q '"healthy":true' && \
                     printf '%s' "$last" | grep -q "\"$NAMESPACE/simplest\":"; then
                    printf '%s' "$last"
                    exit 0
                  fi
                fi
                sleep 1
              done
              printf '%s\n' "$last" >&2
              exit 1
            outputs:
              - name: result
                value: (json_parse($stdout))
        - assert:
            resource:
              (length(values($result))): 1
              (values($result)[0].status.health.healthy): true

    # ---------------------------------------------------------------------------
    # Scenario 2: Bridge rejects unknown command types.
    #             The managed collector annotation must NOT change.
    # ---------------------------------------------------------------------------
    - catch:
        - podLogs:
            selector: app=e2e-test-app-bridge-server
        - podLogs:
            selector: app.kubernetes.io/component=opentelemetry-opamp-bridge
      name: "scenario 2: unknown command is rejected, collector not restarted"
      try:
        # Record the current restartedAt timestamp before sending the unknown command.
        - script:
            content: |
              #!/bin/bash
              set -eu
              kubectl get deployment simplest-collector -n "$NAMESPACE" \
                -o jsonpath='{.spec.template.metadata.annotations.kubectl\.kubernetes\.io/restartedAt}'
            outputs:
              - name: restartedAtBefore
                value: ($stdout)
        - script:
            timeout: 30s
            content: |
              #!/bin/bash
              set -eu
              PROXY_PORT=18321
              kubectl proxy --port=$PROXY_PORT &>/dev/null &
              PROXY_PID=$!
              sleep 1
              curl -fsS -X POST \
                "http://127.0.0.1:$PROXY_PORT/api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents/send-command" \
                -H "Content-Type: application/json" \
                -d '{"command_type":"unknown_xyz"}'
              STATUS=$?
              kill $PROXY_PID 2>/dev/null || true
              exit $STATUS
        - sleep:
            duration: 3s
        # Verify the annotation has not changed - unknown command must not trigger a rollout.
        - script:
            content: |
              #!/bin/bash
              set -eu
              kubectl get deployment simplest-collector -n "$NAMESPACE" \
                -o jsonpath='{.spec.template.metadata.annotations.kubectl\.kubernetes\.io/restartedAt}'
            outputs:
              - name: restartedAtAfter
                value: ($stdout)
        - assert:
            resource:
              ($restartedAtBefore == $restartedAtAfter): true
        # Bridge must have logged the expected "unsupported command type" error.
        - script:
            content: |
              #!/bin/bash
              set -eu
              kubectl logs -l app.kubernetes.io/name=test-opamp-bridge -n "$NAMESPACE" \
                | grep -q "unsupported command type"

    # ---------------------------------------------------------------------------
    # Final: Ensure no unexpected errors in bridge logs.
    #        The "unsupported command type" error from scenario 2 is expected
    #        so filter it out before scanning for unexpected errors.
    # ---------------------------------------------------------------------------
    - name: Ensure no errors in bridge logs
      try:
        - script:
            content: |
              #!/bin/bash
              logs=$(kubectl logs -l app.kubernetes.io/name=test-opamp-bridge -n $NAMESPACE)
              echo "$logs"
              filtered=$(printf '%s\n' "$logs" | grep -v "unsupported command type")
              if printf '%s\n' "$filtered" | grep -qiE '"level":"error"|bad handshake'; then
                echo "Found an unexpected error in the logs!"
                exit 1
              fi
              echo "No unexpected errors found."
