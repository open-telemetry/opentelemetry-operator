apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: opampbridge
spec:
  steps:
    - catch:
        - podLogs:
            selector: app=e2e-test-app-bridge-server
      name: step-00
      try:
        - apply:
            file: 00-install.yaml
        - assert:
            file: 00-assert.yaml
    - catch:
        - podLogs:
            selector: app.kubernetes.io/component=opentelemetry-opamp-bridge
      name: step-01
      try:
        - apply:
            file: 01-install.yaml
        - assert:
            file: 01-assert.yaml
    - name: Check bridge is connected and healthy before installing collectors
      try:
        - script:
            content: |
              #!/bin/bash
              set -eu
              last=""
              for _ in $(seq 1 60); do
                if last=$(kubectl get --raw /api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents 2>/dev/null); then
                  count=$(printf '%s' "$last" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d))" 2>/dev/null || echo "0")
                  if [ "$count" -eq 1 ]; then
                    printf '%s' "$last"
                    exit 0
                  fi
                fi
                sleep 1
              done
              printf '%s\n' "$last" >&2
              exit 1
            outputs:
              - name: result
                value: (json_parse($stdout))
        - assert:
            resource:
              (length(values($result))): 1
              (values($result)[0].status.sequence_num >= `2`): true
              (values($result)[0].status.health.healthy): true
    - catch:
        - podLogs:
            selector: app.kubernetes.io/component=opentelemetry-opamp-bridge
      name: step-02
      try:
        - apply:
            file: 02-install.yaml
        - assert:
            file: 02-assert.yaml
    - try:
        - sleep:
            duration: 1s
    # Right now the heartbeat interval isn't configurable by the CRD for the bridge
    # This means that it can take 45s to inform the server of the new collector
    # By deleting the pod we can just shortcut that
    - try:
        - script:
            content: |
              #!/bin/bash
              kubectl delete pod -l app.kubernetes.io/name=test-opamp-bridge -n $NAMESPACE
    - try:
        - sleep:
            duration: 3s
    - try:
      - assert:
          # specify resource inline
          resource:
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: test-opamp-bridge
            status:
              readyReplicas: 1
    - name: Check effective config contains the managed collector
      try:
        - script:
            content: |
              #!/bin/bash
              set -eu
              last=""
              for _ in $(seq 1 60); do
                if last=$(kubectl get --raw /api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents 2>/dev/null); then
                  if printf '%s' "$last" | grep -q "\"$NAMESPACE/simplest\":" && \
                     printf '%s' "$last" | grep -q '"healthy":true'; then
                    printf '%s' "$last"
                    exit 0
                  fi
                fi
                sleep 1
              done
              printf '%s\n' "$last" >&2
              exit 1
            outputs:
              - name: result
                value: (json_parse($stdout))
        - assert:
            resource:
              (length(values($result))): 1
              (values($result)[0].status.health.healthy): true
    - name: Verify content is accurate
      try:
        - script:
            content: |
              #!/bin/bash
              set -eu
              last=""
              for _ in $(seq 1 60); do
                if last=$(kubectl get --raw /api/v1/namespaces/$NAMESPACE/services/e2e-test-app-bridge-server:4321/proxy/agents 2>/dev/null); then
                  if printf '%s' "$last" | grep -q "\"$NAMESPACE/simplest\":"; then
                    # Extract only the effective_config entry for our test collector by its key
                    key="$NAMESPACE/simplest"
                    printf '%s' "$last" | jq -r --arg k "$key" '.[values | keys[0]].effective_config[$k]'
                    exit 0
                  fi
                fi
                sleep 1
              done
              printf '%s\n' "$last" >&2
              exit 1
            outputs:
              - name: collectorYaml
                value: ($stdout)
        - assert:
            timeout: 30s
            resource:
              (parse_yaml($collectorYaml)):
                metadata:
                  name: simplest
                spec:
                  config:
                    # Right now we can't match null values in chainsaw
                    # Wait for https://github.com/kyverno/kyverno-json/pull/432 to merge
                    exporters: (`{}`)
                    receivers:
                      jaeger:
                        protocols: (`{}`)
                      otlp:
                        protocols: (`{}`)
                    service:
                      pipelines:
                        traces:
                          exporters:
                            - debug
                          receivers:
                            - jaeger
                            - otlp
    - name: Ensure no errors in bridge logs
      try:
        - script:
            content: |
              #!/bin/bash
              logs=$(kubectl logs -l app.kubernetes.io/name=test-opamp-bridge -n $NAMESPACE)
              echo "$logs"
              # Check for any "level":"error" or "bad handshake"
              if echo "$logs" | grep -qiE "\"level\":\"error\"|bad handshake"; then
                echo "Found an error in the logs!"
                exit 1
              fi
              echo "No errors found."
