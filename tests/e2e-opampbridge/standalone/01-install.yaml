apiVersion: v1
kind: ServiceAccount
automountServiceAccountToken: true
metadata:
  name: otel-opamp-bridge-standalone
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: otel-opamp-bridge-standalone
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - list
      - watch
      - update
  - apiGroups:
      - apps
    resources:
      - deployments
      - daemonsets
      - statefulsets
    verbs:
      - get
      - list
      - watch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: otel-opamp-bridge-standalone
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: otel-opamp-bridge-standalone
subjects:
  - kind: ServiceAccount
    name: otel-opamp-bridge-standalone
    namespace: ($namespace)
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-opamp-bridge-standalone-config
data:
  config.yaml: |
    mode: standalone
    endpoint: ws://e2e-test-app-bridge-server:4320/v1/opamp
    healthListenAddr: ":8081"
    heartbeatInterval: 1s
    name: opamp-bridge-standalone
    description:
      non_identifying_attributes:
        deployment.environment: staging
        service.namespace: platform
    capabilities:
      AcceptsRemoteConfig: true
      ReportsEffectiveConfig: true
      ReportsRemoteConfig: true
      ReportsHealth: true
    standalone:
      agents:
        - namespace: ${NAMESPACE}
          type: otel-collector
          description:
            non_identifying_attributes:
              deployment.environment: production
              standalone.agent: collector
              k8s.workload.name: user-supplied-workload-name
          workloadRef:
            apiVersion: apps/v1
            kind: Deployment
            name: standalone-collector
          config:
            collector:
              kind: configmap
              name: standalone-collector
              key: collector.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-opamp-bridge-standalone
  labels:
    app.kubernetes.io/name: otel-opamp-bridge-standalone
    app.kubernetes.io/component: opamp-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-opamp-bridge-standalone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-opamp-bridge-standalone
        app.kubernetes.io/component: opamp-bridge
    spec:
      serviceAccountName: otel-opamp-bridge-standalone
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: bridge
          image: ($operatorOpampBridgeImage)
          args:
            - --config-file=/conf/config.yaml
            - --mode=standalone
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - name: healthz
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: otel-opamp-bridge-standalone-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: standalone-collector
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    exporters:
      debug: {}
    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: standalone-collector
spec:
  replicas: 0
  selector:
    matchLabels:
      app: standalone-collector
  template:
    metadata:
      labels:
        app: standalone-collector
    spec:
      containers:
        - name: collector
          image: busybox:1.36
          command: ["sleep", "3600"]
