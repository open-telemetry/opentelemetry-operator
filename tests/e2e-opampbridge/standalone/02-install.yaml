apiVersion: v1
kind: ConfigMap
metadata:
  name: standalone-agent
data:
  agent.yaml: |
    receivers:
      otlp:
        protocols:
          http: {}
    exporters:
      debug: {}
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [debug]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: standalone-agent
spec:
  replicas: 0
  selector:
    matchLabels:
      app: standalone-agent
  template:
    metadata:
      labels:
        app: standalone-agent
    spec:
      containers:
        - name: collector
          image: busybox:1.36
          command: ["sleep", "3600"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-opamp-bridge-standalone-config
data:
  config.yaml: |
    mode: standalone
    endpoint: ws://e2e-test-app-bridge-server:4320/v1/opamp
    healthListenAddr: ":8081"
    heartbeatInterval: 1s
    name: opamp-bridge-standalone
    capabilities:
      AcceptsRemoteConfig: true
      ReportsEffectiveConfig: true
      ReportsRemoteConfig: true
      ReportsHealth: true
    standalone:
      agents:
        - namespace: ${NAMESPACE}
          type: otel-collector
          workloadRef:
            apiVersion: apps/v1
            kind: Deployment
            name: standalone-collector
          config:
            collector:
              kind: configmap
              name: standalone-collector
              key: collector.yaml
        - namespace: ${NAMESPACE}
          type: otel-agent
          workloadRef:
            apiVersion: apps/v1
            kind: Deployment
            name: standalone-agent
          config:
            agent:
              kind: configmap
              name: standalone-agent
              key: agent.yaml
