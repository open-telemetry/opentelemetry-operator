apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: cluster-collector2
spec:
  mode: deployment
  observability:
    metrics:
      enableMetrics: true
  config:
    receivers:
      otlp:
        protocols:
          grpc: {}
          http: {}
    exporters:
      prometheus:
        endpoint: "0.0.0.0:8091"
    service:
      pipelines:
        metrics:
          receivers: [otlp]
          exporters: [prometheus]
