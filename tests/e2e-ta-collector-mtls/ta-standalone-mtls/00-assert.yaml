apiVersion: apps/v1
kind: Deployment
metadata:
  name: standalone-mtls-targetallocator
status:
  readyReplicas: 1
  replicas: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: standalone-mtls-targetallocator
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: standalone-mtls-ca-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: standalone-mtls-ta-server-cert
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: standalone-mtls-ta-client-cert
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    app.kubernetes.io/component: opentelemetry-targetallocator
    app.kubernetes.io/managed-by: opentelemetry-operator
spec:
  containers:
    - name: ta-container
      ports:
        - containerPort: 8080
          name: http
        - containerPort: 8443
          name: https
---
apiVersion: batch/v1
kind: Job
metadata:
  name: check-ta-serving-over-https
status:
  succeeded: 1
