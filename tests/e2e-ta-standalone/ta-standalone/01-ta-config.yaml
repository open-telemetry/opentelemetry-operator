apiVersion: v1
kind: ConfigMap
metadata:
  name: ta-config
data:
  targetallocator.yaml: |
    allocation_strategy: consistent-hashing
    filter_strategy: relabel-config
    collector_selector:
      matchLabels:
        app: otel-collector
    config:
      scrape_configs:
        - job_name: test-targets
          scrape_interval: 30s
          static_configs:
            - targets:
                - "target-a:8080"
                - "target-b:8080"
                - "target-c:8080"
                - "target-d:8080"
                - "target-e:8080"
                - "target-f:8080"
