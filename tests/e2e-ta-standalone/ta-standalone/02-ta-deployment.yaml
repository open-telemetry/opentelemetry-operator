apiVersion: apps/v1
kind: Deployment
metadata:
  name: ta-standalone
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ta-standalone
  template:
    metadata:
      labels:
        app: ta-standalone
    spec:
      serviceAccountName: ta-standalone
      containers:
        - name: ta
          image: ($TARGETALLOCATOR_IMG)
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: OTELCOL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: ta-config
              mountPath: /conf
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
      volumes:
        - name: ta-config
          configMap:
            name: ta-config
---
apiVersion: v1
kind: Service
metadata:
  name: ta-standalone
spec:
  selector:
    app: ta-standalone
  ports:
    - name: http
      port: 80
      targetPort: http
