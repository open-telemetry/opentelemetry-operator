apiVersion: v1
kind: ConfigMap
metadata:
  name: collector-config
data:
  collector.yaml: |
    receivers:
      prometheus:
        config: {}
        target_allocator:
          collector_id: ${POD_NAME}
          endpoint: http://ta-standalone:80
          interval: 30s
    exporters:
      debug: {}
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [debug]
      telemetry:
        metrics:
          readers:
            - pull:
                exporter:
                  prometheus:
                    host: 0.0.0.0
                    port: 8888
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: collector
spec:
  replicas: 2
  serviceName: collector
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
        - name: collector
          image: ($COLLECTOR_IMG)
          args: ["--config=/conf/collector.yaml"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 8888
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /conf
      volumes:
        - name: config
          configMap:
            name: collector-config
