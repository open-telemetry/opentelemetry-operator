# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: targetallocator-collector-selector
spec:
  steps:
  - name: step-00 - Deploy TA CR without collectorSelector
    try:
    - apply:
        template: true
        file: 00-install.yaml
    - assert:
        file: 00-assert.yaml
    catch:
    - podLogs:
        selector: app.kubernetes.io/name=opentelemetry-operator
  - name: step-01 - Add collectorSelector to TA CR
    try:
    - apply:
        template: true
        file: 01-add-collector-selector.yaml
    - assert:
        file: 01-assert.yaml
    catch:
    - podLogs:
        selector: app.kubernetes.io/name=opentelemetry-operator
  - name: step-02 - Update collectorSelector with matchExpressions
    try:
    - apply:
        template: true
        file: 02-update-collector-selector.yaml
    - assert:
        file: 02-assert.yaml
    catch:
    - podLogs:
        selector: app.kubernetes.io/name=opentelemetry-operator
