apiVersion: v1
automountServiceAccountToken: true
kind: ServiceAccount
metadata:
  name: collector
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: (join('-', ['collector-insecure-auth', $namespace]))
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - nodes
  - nodes/metrics
  - services
  - endpoints
  - namespaces
  verbs:
  - get
  - watch
  - list
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - watch
  - list
- nonResourceURLs:
  - /metrics
  - /metrics/cadvisor
  verbs:
  - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: (join('-', ['collector-insecure-auth', $namespace]))
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: (join('-', ['collector-insecure-auth', $namespace]))
subjects:
- kind: ServiceAccount
  name: collector
  namespace: ($namespace)
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: insecure-auth
spec:
  config:
    receivers:
      prometheus:
        config:
          scrape_configs: []
    exporters:
      debug:
        verbosity: detailed
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [debug]
  mode: statefulset
  serviceAccount: collector
  targetAllocator:
    enabled: true
    allowInsecureAuthSecrets: true
    prometheusCR:
      enabled: true
      scrapeInterval: 1s
      secretNamespaces:
      - ($namespace)
      serviceMonitorSelector: {}
      podMonitorSelector: {}
    serviceAccount: ta
