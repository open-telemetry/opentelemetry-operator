apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: no-promconfig-collector
status:
  readyReplicas: 1
  replicas: 1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: no-promconfig-targetallocator
status:
  observedGeneration: 1
  readyReplicas: 1
  replicas: 1
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: no-promconfig-targetallocator
---
# The rendered collector config must contain the operator-injected
# target_allocator block but no `config:` key under prometheus (the user
# didn't supply one and the operator should not synthesise one).
apiVersion: v1
data:
  collector.yaml: |
    exporters:
        prometheus:
            endpoint: 0.0.0.0:9090
    receivers:
        prometheus:
            target_allocator:
                collector_id: ${POD_NAME}
                endpoint: http://no-promconfig-targetallocator:80
                interval: 30s
    service:
        pipelines:
            metrics:
                exporters:
                    - prometheus
                receivers:
                    - prometheus
        telemetry:
            metrics:
                readers:
                    - pull:
                          exporter:
                              prometheus:
                                  host: 0.0.0.0
                                  port: 8888
                                  without_scope_info: false
                                  without_type_suffix: false
                                  without_units: false
kind: ConfigMap
metadata:
  labels:
      app.kubernetes.io/component: opentelemetry-collector
      app.kubernetes.io/managed-by: opentelemetry-operator
      app.kubernetes.io/name: no-promconfig-collector
