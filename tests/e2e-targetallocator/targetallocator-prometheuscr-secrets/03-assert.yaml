# After secret deletion, verify the system handles it gracefully
# The ServiceMonitor should still be in the config, but the secret reference should be handled
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: metrics-servicemonitor
---
# Verify target allocator deployment is still running and healthy after secret deletion
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-cr-secrets-targetallocator
status:
  readyReplicas: 1
  replicas: 1
