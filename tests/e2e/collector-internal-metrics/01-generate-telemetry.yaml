apiVersion: batch/v1
kind: Job
metadata:
  name: telemetrygen-traces
spec:
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app: telemetrygen-traces
    spec:
      containers:
        - name: telemetrygen
          image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:v0.124.1
          command: ["./telemetrygen"]
          args:
            - "--otlp-endpoint=internal-metrics-collector-headless:4317"
            - "--otlp-insecure=true"
            - "--rate=1"
            - "--duration=30s"
            - "--workers=1"
            - "traces"
      restartPolicy: Never
---
