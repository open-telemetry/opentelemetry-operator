apiVersion: v1
kind: Pod
metadata:
  labels:
    app.kubernetes.io/name: opentelemetry-operator
    control-plane: controller-manager
  namespace: opentelemetry-operator-system
status:
  containerStatuses:
  - name: manager
    ready: true
    started: true
  phase: Running

---
apiVersion: v1
kind: Service
metadata:
  name: opentelemetry-operator-controller-manager-metrics-service
  namespace: opentelemetry-operator-system
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  selector:
    app.kubernetes.io/name: opentelemetry-operator
    control-plane: controller-manager
  type: ClusterIP
