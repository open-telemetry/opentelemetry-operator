# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: smoke-collector-daemonset
# Consolidated smoke test for the OpenTelemetryCollector "daemonset" mode.
# Replaces smoke-daemonset and daemonset-features, plus the daemonset arm of the
# per-attribute tests (affinity/additional-containers/node-selector).
spec:
  steps:
    - name: install
      description: install a daemonset collector with host-level and pod-spec fields set
      try:
        - apply:
            file: 00-install.yaml
        - assert:
            file: 00-assert.yaml
