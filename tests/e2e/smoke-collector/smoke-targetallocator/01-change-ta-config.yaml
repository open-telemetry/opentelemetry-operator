apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: stateful
spec:
  mode: statefulset
  targetAllocator:
    enabled: true
    serviceAccount: ta
    prometheusCR:
      enabled: true
      serviceMonitorSelector:
        matchLabels:
          key: value # this is just an arbitrary change to the target allocator config
  config:
    receivers:
      jaeger:
          protocols:
            grpc: {}

      # Collect own metrics
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 10s
              static_configs:
                - targets: [ '0.0.0.0:8888' ]
    exporters:
      debug: {}
    service:
      pipelines:
        traces:
          receivers: [jaeger]
          exporters: [debug]
