apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: pa
  annotations:
    regular-annotation: regular-value
spec:
  podAnnotations:
    pod-annotation1: value1
    pod-annotation2: value2
  config:
    receivers:
      jaeger:
        protocols:
          grpc: {}
    exporters:
      debug: {}

    service:
      pipelines:
        traces:
          receivers: [jaeger]
          exporters: [debug]
