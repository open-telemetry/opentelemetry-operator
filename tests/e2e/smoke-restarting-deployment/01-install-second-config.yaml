apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: restarting
spec:
  config:
    receivers:
      jaeger:
        protocols:
          grpc: {}
      otlp:
        protocols:
          grpc: {}
    exporters:
      debug: {}
    service:
      pipelines:
        traces:
          receivers: [jaeger, otlp]
          exporters: [debug]

