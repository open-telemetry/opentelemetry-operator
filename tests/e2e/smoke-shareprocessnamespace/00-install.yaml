apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: test-shareprocns
spec:
  shareProcessNamespace: true
  config:
    receivers:
      jaeger:
        protocols:
          grpc: {}
      otlp:
        protocols:
          grpc: {}
          http: {}
    exporters:
      debug: {}

    service:
      pipelines:
        traces:
          receivers: [jaeger,otlp]
          exporters: [debug]