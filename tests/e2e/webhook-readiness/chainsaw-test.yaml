apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: webhook-readiness
spec:
  steps:
    - name: Verify webhook readiness check is registered
      try:
        - command:
            entrypoint: kubectl
            args:
              - get
              - pods
              - -A
              - -l app.kubernetes.io/name=opentelemetry-operator
              - -o
              - jsonpath={.items[0].metadata.namespace}
            outputs:
              - name: otelnamespace
                value: ($stdout)
        - command:
            entrypoint: kubectl
            args:
              - get
              - pods
              - -A
              - -l app.kubernetes.io/name=opentelemetry-operator
              - -o
              - jsonpath={.items[0].metadata.name}
            outputs:
              - name: otelpod
                value: ($stdout)
        - script:
            timeout: 60s
            env:
              - name: otelnamespace
                value: ($otelnamespace)
              - name: otelpod
                value: ($otelpod)
            content: |
              #!/bin/bash
              set -euo pipefail
              kubectl port-forward -n "$otelnamespace" "$otelpod" 18081:8081 &
              PF_PID=$!
              trap "kill $PF_PID 2>/dev/null || true" EXIT

              for i in $(seq 1 10); do
                RESULT=$(curl -sf http://localhost:18081/readyz?verbose 2>/dev/null) && break
                sleep 2
              done

              echo "$RESULT"
              echo "$RESULT" | grep -q "\[+\]webhook"
            check:
              ($error == null): true

    - name: Verify webhook accepts requests after readiness
      try:
        - apply:
            resource:
              apiVersion: opentelemetry.io/v1alpha1
              kind: Instrumentation
              metadata:
                name: webhook-readiness-test
              spec:
                exporter:
                  endpoint: http://otel-collector:4317
        - assert:
            resource:
              apiVersion: opentelemetry.io/v1alpha1
              kind: Instrumentation
              metadata:
                name: webhook-readiness-test
      catch:
        - events: {}
      cleanup:
        - delete:
            ref:
              apiVersion: opentelemetry.io/v1alpha1
              kind: Instrumentation
              name: webhook-readiness-test
